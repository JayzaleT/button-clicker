<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red & Blue Button Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Button Clicker</h1>
        <div class="score">
            Score: <span id="score">0</span>
        </div>
        <div class="buttons">
            <button id="redBtn" class="btn red">Red (+1)</button>
            <button id="blueBtn" class="btn blue">Blue (+1)</button>
        </div>
        <button id="resetBtn" class="reset">Reset</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
